<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
        }

        .img-wrap {
            width: 350px;
            cursor: pointer;
        }

        .img-wrap img {
            width: 100%;
            display: block;
        }

        .img-wrap img.hover {
            display: none;
        }

        .img-wrap:hover img.normal {
            display: none;
        }

        .img-wrap:hover img.hover {
            display: block;
        }
    </style>
</head>

<body>

    <a href="https://sites.google.com/chibatech.ac.jp/24g2052/授業">
        <div class="img-wrap">
            <img src="https://i.imgur.com/UBnYt7k.png" class="normal">
            <img src="https://i.imgur.com/S1BWuBb.jpeg" class="hover">
        </div>
    </a>

</body>

</html>
