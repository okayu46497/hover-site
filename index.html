<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
}
.img-wrap {
  width: 350px;
  cursor: pointer;
}
.img-wrap img {
  width: 100%;
  display: block;
}
.img-wrap img.hover {
  display: none;
}
.img-wrap:hover img.normal {
  display: none;
}
.img-wrap:hover img.hover {
  display: block;
}
</style>
</head>

<body>

<a href="https://sites.google.com/chibatech.ac.jp/24g2052/授業" target="_top">
  <div class="img-wrap">
    <img src="https://raw.githubusercontent.com/okayu46497/hover-site/main/closed.png" class="normal">
    <img src="https://raw.githubusercontent.com/okayu46497/hover-site/main/open.jpeg" class="hover">
  </div>
</a>

</body>
</html>
